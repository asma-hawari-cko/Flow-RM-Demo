<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Payment successful — Checkout.com Flow demo</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="card">
      <div class="result">
        <div class="result__icon result__icon--success" aria-hidden="true">&#10003;</div>
        <h1>Payment successful</h1>
        <p>Thanks for your purchase. A confirmation email is on its way.</p>

        <div class="summary text-center">
          <div class="summary__row"><span>Payment ID</span><strong id="payment-id">—</strong></div>
          <div class="summary__row" id="status-row" style="display:none;"><span>Status</span><strong id="payment-status">—</strong></div>
        </div>

        <div class="stack">
          <a class="btn" href="/checkout.html">Make another payment</a>
          <a class="btn btn--ghost" href="/" id="sign-out">Sign out</a>
        </div>
      </div>
    </main>

    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const id = params.get('cko-payment-id') || params.get('cko-session-id') || '';
        document.getElementById('payment-id').textContent = id || 'n/a';

        document.getElementById('sign-out').addEventListener('click', function () {
          sessionStorage.removeItem('cko_user');
        });

        // Optional: confirm payment status server-side.
        if (id) {
          fetch('/api/payments/' + encodeURIComponent(id))
            .then(function (r) { return r.ok ? r.json() : null; })
            .then(function (data) {
              if (data && data.status) {
                document.getElementById('payment-status').textContent = data.status;
                document.getElementById('status-row').style.display = 'flex';
              }
            })
            .catch(function () { /* non-blocking */ });
        }
      })();
    </script>
  </body>
</html>
